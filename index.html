<!DOCTYPE html>
<html>
<head>
    <title>Birthday App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            background-image: url('2.jpg'); /* তোমার ছবির নাম */
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }
        h2 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            color: white;
            animation: fadeIn 2s ease-in-out;
        }
        .inputBox {
            position: relative;
            display: inline-block;
        }
        .inputBox input {
            padding: 12px 15px;
            border-radius: 25px;
            font-size: 16px;
            width: 280px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            color: #333;
            outline: none;
            border: 3px solid transparent;
            background-clip: padding-box;
        }
        .inputBox::before {
            content: "";
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            border-radius: 25px;
            background: linear-gradient(270deg, #ff4081, #e91e63, #2196f3, #4caf50);
            background-size: 600% 600%;
            z-index: -1;
            animation: rotateBorder 6s linear infinite;
        }
        @keyframes rotateBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #message {
            display: none;
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
            animation: fadeIn 2s ease-in-out;

            /* Gradient + Glow effect */
            background: linear-gradient(
              270deg,
              red,
              orange,
              yellow,
              green,
              blue,
              indigo,
              violet
            );
            background-size: 800% 800%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowWave 10s ease infinite, fadeIn 2s ease-in-out;

            text-shadow: 0 0 10px rgba(255,255,255,0.8),
                         0 0 20px rgba(255,255,255,0.6),
                         0 0 30px rgba(255,255,255,0.4);
        }
        @keyframes rainbowWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        button {
            padding: 12px 25px;
            margin-top: 20px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            background: linear-gradient(45deg, navy, #000080);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            animation: bounce 2s infinite;
        }
        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #000080, navy);
        }
        #videoSection {
            display: none;
            margin-top: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        @keyframes bounce {
            0%, 100% {transform: translateY(0);}
            50% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>
    <h2>Enter Your Name</h2>
    <div class="inputBox">
        <input type="text" id="nameInput" placeholder="Type your name">
    </div>
    <button onclick="showMessage()">Enter</button>

    <div id="message"></div>

    <div id="videoSection">
        <video id="birthdayVideo" width="400" controls>
            <source src="Main H.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

    <script>
        function showMessage() {
            let name = document.getElementById("nameInput").value;
            if(name.trim() !== "") {
                let messageDiv = document.getElementById("message");
                messageDiv.innerHTML = "🎉 Happy Birthday, " + name + "! 🎉<br><br>" +
                    "May your birthday be the beginning of another year filled with happiness, success, good health, and unforgettable moments. Happy Birthday! 🎉🎂";
                messageDiv.style.display = "block";

                // ৪ সেকেন্ড পর ভিডিও চালু হবে
                setTimeout(playVideo, 4000);
            } else {
                alert("Please enter your name!");
            }
        }

        function playVideo() {
            let videoSection = document.getElementById("videoSection");
            let video = document.getElementById("birthdayVideo");
            videoSection.style.display = "block";
            video.play();

            // ফুলস্ক্রিনে চালানো
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) {
                video.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>
