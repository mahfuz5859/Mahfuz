<!DOCTYPE html>
<html>
<head>
    <title>Birthday App</title>
    <!-- Lexend font যোগ করা হলো -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            background-image: url('2.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
        }
        h2 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 25px;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            color: white;
            animation: fadeIn 2s ease-in-out;
            text-shadow: 0 0 10px #ff4081,
                         0 0 20px #ff4081,
                         0 0 30px #ff4081;
        }
        .inputBox {
            position: relative;
            display: inline-block;
        }
        .inputBox input {
            padding: 12px 15px;
            border-radius: 25px;
            font-size: 16px;
            width: 280px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            color: #333;
            outline: none;
            border: 3px solid transparent;
        }
        .inputBox::before {
            content: "";
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            border-radius: 25px;
            background: linear-gradient(270deg, #ff4081, #e91e63, #ff0000, #ff9800, #4caf50, violet);
            background-size: 600% 600%;
            z-index: -1;
            animation: rotateBorder 6s linear infinite;
        }
        @keyframes rotateBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #message {
            display: none;
            font-size: 30px;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
            font-family: 'Lexend', sans-serif; /* Lexend font */
            background: linear-gradient(270deg, red, orange, yellow, green, violet);
            background-size: 800% 800%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowWave 10s ease infinite;
            white-space: pre-line;
        }
        @keyframes rainbowWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        button {
            padding: 12px 25px;
            margin-top: 20px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            background: linear-gradient(45deg, navy, #000080);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            animation: bounce 2s infinite;
        }
        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #000080, navy);
        }
        #videoSection {
            display: none;
            margin-top: 20px;
            opacity: 0; /* শুরুতে লুকানো */
        }
        #videoSection.fade-in {
            animation: fadeVideo 3s ease forwards; /* fade-in effect */
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        @keyframes fadeVideo {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        @keyframes bounce {
            0%, 100% {transform: translateY(0);}
            50% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>
    <h2>Enter Your Name</h2>
    <div class="inputBox">
        <input type="text" id="nameInput" placeholder="Type your name">
    </div>
    <button onclick="showMessage()">Enter</button>

    <div id="message"></div>

    <div id="videoSection">
        <video id="birthdayVideo" width="400" controls playsinline>
            <source src="Main H.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Background music -->
    <audio id="bgMusic" src="music.mp3" preload="auto" loop></audio>

    <script>
        // ওয়েবসাইটে ঢুকলেই background music auto play হবে
        window.addEventListener("load", function() {
            let bgMusic = document.getElementById("bgMusic");
            bgMusic.volume = 0.2; // 20% volume
            bgMusic.play().catch(err => {
                console.log("Autoplay blocked:", err);
            });
        });

        function showMessage() {
            let name = document.getElementById("nameInput").value;
            if(name.trim() !== "") {
                let messageDiv = document.getElementById("message");
                messageDiv.style.display = "block";

                let fullMessage = "🎉 Happy Birthday, " + name + " 🎉\nMay your birthday be the beginning of another year filled with happiness, success, good health, and unforgettable moments.\nHappy Birthday 🎂";
                
                let i = 0;
                messageDiv.innerHTML = "";

                let interval = setInterval(() => {
                    messageDiv.innerHTML += fullMessage.charAt(i);
                    i++;
                    if(i >= fullMessage.length) {
                        clearInterval(interval);
                        setTimeout(playVideo, 4000);
                    }
                }, 100);

                // Enter ক্লিকের সময় fullscreen request
                let video = document.getElementById("birthdayVideo");
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) {
                    video.msRequestFullscreen();
                }
            } else {
                alert("Please enter your name!");
            }
        }

        function playVideo() {
            let videoSection = document.getElementById("videoSection");
            let video = document.getElementById("birthdayVideo");
            let bgMusic = document.getElementById("bgMusic");

            videoSection.style.display = "block";
            videoSection.classList.add("fade-in"); // fade-in effect
            video.volume = 0.3; // ভিডিও sound 20%
            video.play();

            // ভিডিও চালু হলে background music বন্ধ হবে
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }
    </script>
</body>
</html>
